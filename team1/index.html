<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakSquad — Duck Duck Fight 🦆</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@400;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: "Space Grotesk", sans-serif;
      color: #1a1a2e;
      overflow-x: hidden;
    }

    /* ── Animations ────────────────────────────────── */
    @keyframes pop-in {
      0%   { transform: scale(0) rotate(-8deg); opacity: 0; }
      60%  { transform: scale(1.1) rotate(2deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    @keyframes slide-up {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    @keyframes feather-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      20%  { opacity: 0.5; }
      100% { transform: translateY(20px) rotate(20deg); opacity: 0.3; }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    @keyframes waddle {
      0%, 100% { transform: rotate(0); }
      25%      { transform: rotate(-5deg); }
      75%      { transform: rotate(5deg); }
    }

    @keyframes ripple {
      0%   { transform: scale(0.8); opacity: 0.6; }
      50%  { transform: scale(1.2); opacity: 0.3; }
      100% { transform: scale(0.8); opacity: 0.6; }
    }

    @keyframes water-shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes lily-float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25%      { transform: translate(4px, -3px) rotate(2deg); }
      50%      { transform: translate(-2px, -5px) rotate(-1deg); }
      75%      { transform: translate(-4px, -2px) rotate(1deg); }
    }

    /* ── Hero — Water Pond ────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 2rem;
      gap: 1.2rem;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(144, 213, 196, 0.4) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 70%, rgba(72, 166, 145, 0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(100, 190, 170, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(45, 120, 100, 0.3) 0%, transparent 40%),
        linear-gradient(180deg, #B5E8D5 0%, #7ECFB3 20%, #5ABFA0 40%, #3EA98A 60%, #2D8A70 80%, #1E6B55 100%);
    }

    /* Water surface shimmer overlay */
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.06) 20px,
          transparent 40px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          rgba(255, 255, 255, 0.04) 30px,
          transparent 60px
        );
      background-size: 200% 200%;
      animation: water-shimmer 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle light caustics effect */
    .hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 25% 35%, rgba(255, 255, 255, 0.15) 0%, transparent 30%),
        radial-gradient(ellipse at 75% 55%, rgba(255, 255, 255, 0.1) 0%, transparent 25%),
        radial-gradient(ellipse at 40% 75%, rgba(255, 255, 255, 0.08) 0%, transparent 20%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Floating pond elements ───────────────────── */
    .feather {
      position: absolute;
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }
    /* Lily pads and ripples */
    .feather:nth-child(1) { top: 12%; left: 8%; font-size: 2.5rem; animation: lily-float 5s ease-in-out infinite; }
    .feather:nth-child(2) { top: 22%; right: 10%; font-size: 2rem; animation: lily-float 6s ease-in-out infinite 1s; }
    .feather:nth-child(3) { bottom: 15%; left: 12%; font-size: 2.2rem; animation: lily-float 5.5s ease-in-out infinite 2s; }
    .feather:nth-child(4) { bottom: 25%; right: 6%; font-size: 1.8rem; animation: ripple 3s ease-in-out infinite 0.5s; opacity: 0.35; }
    .feather:nth-child(5) { top: 55%; left: 4%; font-size: 1.5rem; animation: ripple 4s ease-in-out infinite 1.5s; opacity: 0.3; }
    .feather:nth-child(6) { top: 40%; right: 4%; font-size: 2rem; animation: lily-float 7s ease-in-out infinite 0.8s; }

    /* ── Back link ─────────────────────────────────── */
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1.2rem;
      color: #fff;
      text-decoration: none;
      font-family: "Bangers", cursive;
      font-size: 1.1rem;
      letter-spacing: 1px;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 3px solid #1a1a2e;
      background: #2D8A70;
      box-shadow: 3px 3px 0 #1a1a2e;
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }

    .back-link:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #1a1a2e;
    }

    /* ── Bouncing duck mascot ──────────────────────── */
    .mascot {
      font-size: 4rem;
      animation: bob 2s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    /* ── Team label ────────────────────────────────── */
    .team-label {
      font-family: "Bangers", cursive;
      font-size: 1.3rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #1a5c47;
      padding: 0.3rem 1.4rem;
      border-radius: 999px;
      border: 3px solid #1a1a2e;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 3px 3px 0 #2D8A70;
      animation: slide-up 0.6s ease-out both;
      position: relative;
      z-index: 2;
    }

    /* ── Team picture ──────────────────────────────── */
    .team-pic {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border-radius: 28px;
      border: 5px solid #1a1a2e;
      background: #fff;
      box-shadow: 8px 8px 0 #3EA98A;
      animation: pop-in 0.7s ease-out both 0.2s;
      position: relative;
      z-index: 2;
      transition: transform 0.3s;
    }

    .team-pic:hover {
      transform: scale(1.05) rotate(3deg);
    }

    /* ── Team name ─────────────────────────────────── */
    .team-name {
      font-family: "Bangers", cursive;
      font-size: 5rem;
      color: #fff;
      line-height: 1;
      letter-spacing: 5px;
      text-shadow: 4px 4px 0 #1a5c47, 0 0 20px rgba(45, 138, 112, 0.4);
      animation: pop-in 0.7s ease-out both 0.4s;
      position: relative;
      z-index: 2;
    }

    /* ── Slogan (speech bubble) ────────────────────── */
    .team-slogan {
      position: relative;
      z-index: 2;
      font-size: 1.1rem;
      font-weight: 700;
      font-style: italic;
      color: #1a1a2e;
      background: #fff;
      padding: 1rem 1.8rem;
      border-radius: 24px;
      border: 4px solid #1a1a2e;
      box-shadow: 4px 4px 0 #3EA98A;
      max-width: 400px;
      animation: slide-up 0.6s ease-out both 0.6s;
    }

    .team-slogan::before {
      content: "";
      position: absolute;
      top: -16px;
      left: 50%;
      margin-left: -10px;
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 16px solid #1a1a2e;
    }

    .team-slogan::after {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      margin-left: -7px;
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 11px solid #fff;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 768px) {
      .team-name { font-size: 3rem; }
      .team-pic  { width: 220px; height: 220px; }
      .team-slogan { font-size: 1rem; padding: 0.8rem 1.2rem; }
      .mascot { font-size: 3rem; }
      .feather:nth-child(5), .feather:nth-child(6) { display: none; }
    }

    /* ── Sound toggle button ─────────────────────── */
    .sound-toggle {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      font-size: 1.6rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid #1a1a2e;
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 3px 3px 0 #2D8A70;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      line-height: 1;
    }
    .sound-toggle:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #2D8A70;
    }

    /* Click-to-start overlay */
    .sound-start-overlay {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #1a5c47;
      background: rgba(255, 255, 255, 0.9);
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      border: 3px solid #1a1a2e;
      box-shadow: 3px 3px 0 #2D8A70;
      cursor: pointer;
      z-index: 10;
      animation: slide-up 0.6s ease-out both 1s;
      transition: opacity 0.4s;
    }

    /* ── Game button ──────────────────────────────── */
    .game-btn {
      display: inline-block;
      font-family: "Bangers", cursive;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #1a1a2e;
      background: #fff;
      text-decoration: none;
      border: 4px solid #1a1a2e;
      border-radius: 999px;
      padding: 0.7rem 2.2rem;
      box-shadow: 5px 5px 0 #2D8A70;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      z-index: 2;
      animation: slide-up 0.6s ease-out both 0.8s;
    }

    .game-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 7px 7px 0 #2D8A70;
    }

    .game-btn:active {
      transform: translate(0, 0);
      box-shadow: 3px 3px 0 #2D8A70;
    }

    /* 🎨 Feel free to ask Claude to restyle this page however you like! */
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">← Back</a>

  <div class="hero">
    <!-- floating pond elements -->
    <span class="feather">🪷</span>
    <span class="feather">🍃</span>
    <span class="feather">🪷</span>
    <span class="feather">💧</span>
    <span class="feather">💧</span>
    <span class="feather">🍃</span>

    <div class="mascot">🦆</div>
    <p class="team-label">😇 KakSquad</p>

    <!-- ✏️ Drop your AI-generated image into this folder as picture.png -->
    <img
      class="team-pic"
      src="./new picture.png"
      alt="KakSquad picture"
    />

    <!-- ✏️ Replace "Team 1" with your team name (also update this in the homepage!) -->
    <h1 class="team-name">KakSquad</h1>

    <!-- ✏️ Replace this slogan with something fun -->
    <p class="team-slogan">All quack, no slack 🦆</p>

    <a class="game-btn" href="game.html">🎮 Play Game →</a>
  </div>

  <!-- Sound toggle + start prompt -->
  <button class="sound-toggle" id="soundToggle" title="Mute / Unmute">🔇</button>
  <div class="sound-start-overlay" id="soundStart">🦆 Click anywhere to start the quack track</div>

  <script>
    (function () {
      let ctx, playing = false, started = false, muted = false;
      let quackTimer = null;
      const btn = document.getElementById("soundToggle");
      const overlay = document.getElementById("soundStart");

      /* ── Synthesise a single quack ────────────────── */
      function quack() {
        if (!ctx || muted) return;
        const now = ctx.currentTime;
        const duration = 0.15 + Math.random() * 0.1;

        // Main voice — nasally sawtooth
        const osc = ctx.createOscillator();
        osc.type = "sawtooth";
        const baseFreq = 700 + Math.random() * 400;
        osc.frequency.setValueAtTime(baseFreq, now);
        osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.55, now + duration);

        // Nasal formant
        const bandpass = ctx.createBiquadFilter();
        bandpass.type = "bandpass";
        bandpass.frequency.value = 1800 + Math.random() * 400;
        bandpass.Q.value = 5;

        // Envelope
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.18, now + 0.02);
        gain.gain.linearRampToValueAtTime(0.15, now + duration * 0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(bandpass);
        bandpass.connect(gain);
        gain.connect(ctx.destination);

        osc.start(now);
        osc.stop(now + duration + 0.05);
      }

      /* ── Schedule a quack pattern ─────────────────── */
      function scheduleQuacks() {
        if (muted) return;
        // 1–3 rapid quacks
        const count = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
          setTimeout(quack, i * 180);
        }
        // Next burst in 2–6 seconds
        const next = 2000 + Math.random() * 4000;
        quackTimer = setTimeout(scheduleQuacks, next);
      }

      /* ── Start audio (needs user gesture) ─────────── */
      function startAudio() {
        if (started) return;
        started = true;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        playing = true;
        btn.textContent = "🔊";
        overlay.style.opacity = "0";
        setTimeout(function () { overlay.style.display = "none"; }, 400);
        scheduleQuacks();
      }

      /* ── Toggle mute ──────────────────────────────── */
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (!started) { startAudio(); return; }
        muted = !muted;
        btn.textContent = muted ? "🔇" : "🔊";
        if (muted) {
          clearTimeout(quackTimer);
        } else {
          scheduleQuacks();
        }
      });

      /* ── Click anywhere to start ──────────────────── */
      document.addEventListener("click", startAudio, { once: true });
    })();
  </script>

  <!-- 🎨 Feel free to ask Claude to restyle this page however you like! -->

</body>
</html>
